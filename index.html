<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Gerador de Charadas</title>
</head>
<body class="bg-slate-900 bg-[radial-gradient(circle,_#1e293b_1px,_transparent_1px)] [background-size:20px_20px] flex flex-col items-center justify-center min-h-screen p-4 font-sans">

    <h1 class="text-4xl font-black text-white mb-10 tracking-tighter uppercase italic">
        Cha <span class="text-amber-400">Radas</span>
    </h1>

    <div class="group w-full max-w-sm [perspective:1000px] h-80">
        <div id="card-inner" class="relative w-full h-full transition-all duration-700 [transform-style:preserve-3d] cursor-pointer">
            
            <div class="absolute inset-0 [backface-visibility:hidden] bg-amber-50 rounded-2xl flex flex-col items-center justify-between p-6 text-center border-8 border-white shadow-[0_20px_50px_rgba(0,0,0,0.3)] ring-4 ring-amber-400">
                
                <div class="w-full flex justify-between items-center opacity-30">
                    <span class="text-2xl">?</span>
                    <span class="text-xs font-bold uppercase tracking-widest text-amber-800">Desafio #01</span>
                    <span class="text-2xl">?</span>
                </div>
                
                <div class="flex-1 flex flex-col justify-center">
                    <p id="pergunta" class="text-xl font-bold text-slate-800 leading-tight">
                        Carregando charada...
                    </p>
                </div>

                <div class="w-full space-y-3">
                    <input
                        type="text"
                        id="tentativa"
                        placeholder="Qual o seu palpite?"
                        class="w-full border-b-2 border-amber-200 bg-transparent px-2 py-2 text-center outline-none focus:border-amber-500 transition-colors text-lg"
                    >
                    <button
                        id="btn-verificar"
                        class="w-full bg-slate-800 hover:bg-black text-white font-bold py-3 rounded-xl transition-all shadow-md active:scale-95"
                    >
                        Revelar
                    </button>
                    <p id="mensagem" class="h-4 text-xs font-bold uppercase"></p>
                </div>
            </div>

            <div class="absolute inset-0 [backface-visibility:hidden] bg-amber-400 rounded-2xl flex flex-col items-center justify-center p-6 text-center text-slate-900 [transform:rotateY(180deg)] border-8 border-white shadow-2xl ring-4 ring-amber-500">
                <div class="absolute top-4 left-4 text-4xl opacity-20">✨</div>
                <span class="text-amber-900 font-black uppercase tracking-widest text-sm mb-4">A Resposta é:</span>
                <p id="resposta" class="text-3xl font-black drop-shadow-sm"></p>
                <div class="absolute bottom-4 right-4 text-4xl opacity-20">✨</div>
            </div>

        </div>
    </div>

    <button id="btn-nova" class="mt-12 group flex items-center gap-2 bg-amber-400 hover:bg-amber-300 text-slate-900 font-black py-4 px-10 rounded-2xl transition-all shadow-[0_8px_0_rgb(180,130,20)] active:shadow-none active:translate-y-2">
        PRÓXIMA CARTA 
        <span class="text-2xl group-hover:rotate-12 transition-transform">🃏</span>
    </button>

    <script src="script.js"></script>
</body>
</html>
